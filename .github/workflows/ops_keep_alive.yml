name: Ops - Keep Alive

# GitHub disables scheduled workflows on repos with no activity for 60 days.
# This workflow pings itself weekly to prevent that.
# It also serves as a canary — if this fails, Actions permissions are broken.
on:
  schedule:
    - cron: '0 12 * * 1'  # every Monday at noon UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Keep scheduled workflows alive
        run: echo "Keep-alive ping at $(date -u). Scheduled workflows remain active."
