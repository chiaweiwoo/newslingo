name: Update Anthropic Pricing

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC daily (10:00 SGT)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-rates:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - run: uv sync
        name: Install dependencies

      - name: Run pricing update script
        id: update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set +e
          uv run python .github/scripts/update_rates.py
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Commit updated pricing
        if: steps.update.outputs.exit_code == '42'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rates.json
          git commit -m "chore: update Anthropic pricing $(date -u +%Y-%m-%d)"
          git push
